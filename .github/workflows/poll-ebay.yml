name: Poll eBay sales

on:
  # Sparse cron (every ~6h) just RESTARTS the loop. Sparse schedules are
  # honoured reliably by GitHub; the every-5-min granularity comes from the
  # in-job loop below, not from cron.
  schedule:
    - cron: "3 */6 * * *"
  workflow_dispatch:

# Only one sync may run at a time. A queued restart starts the moment the
# current loop finishes, so the hand-off is seamless.
concurrency:
  group: ebay-sync
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync every 5 minutes (loop ~5h40m, then a fresh run takes over)
        env:
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
          EBAY_REFRESH_TOKEN_1: ${{ secrets.EBAY_REFRESH_TOKEN_1 }}
          EBAY_REFRESH_TOKEN_2: ${{ secrets.EBAY_REFRESH_TOKEN_2 }}
          EBAY_REFRESH_TOKEN_3: ${{ secrets.EBAY_REFRESH_TOKEN_3 }}
          EBAY_REFRESH_TOKEN_4: ${{ secrets.EBAY_REFRESH_TOKEN_4 }}
          EBAY_REFRESH_TOKEN_5: ${{ secrets.EBAY_REFRESH_TOKEN_5 }}
          EBAY_REFRESH_TOKEN_6: ${{ secrets.EBAY_REFRESH_TOKEN_6 }}
          EBAY_SIGNING_KEY: ${{ secrets.EBAY_SIGNING_KEY }}
          EBAY_SIGNING_PRIVATE: ${{ secrets.EBAY_SIGNING_PRIVATE }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_REFRESH_TOKEN: ${{ secrets.MS_REFRESH_TOKEN }}
          ONEDRIVE_FILE_ID: ${{ secrets.ONEDRIVE_FILE_ID }}
        run: |
          for i in $(seq 1 68); do
            echo "=== sync $i / 68 ==="
            node fetch_ebay.js || echo "sync $i failed, will retry next cycle"
            if [ "$i" -lt 68 ]; then sleep 300; fi
          done
